apiVersion: openr.ag/v1alpha1
kind: OpenRAG
metadata:
  name: my-openrag
  namespace: my-tenant
spec:
  targetNamespace: my-tenant

  frontend:
    image: langflowai/openrag-frontend:latest
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

  backend:
    image: langflowai/openrag-backend:latest
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
    # jwtSigningKeySecret:
    #   name: my-jwt-secret
    #   key: JWT_SIGNING_KEY
    storage:
      enabled: true
      size: "1Gi"
    # flowIds:
    #   chat: ""
    #   ingest: ""
    #   urlIngest: ""
    #   nudges: ""

  langflow:
    image: langflowai/openrag-langflow:latest
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      enabled: true
      size: "1Gi"

  # llm:
  #   provider: watsonx
  #   model: ibm/granite-3-2-8b-instruct

  # embedding:
  #   provider: watsonx
  #   model: ibm/granite-embedding-278m-multilingual

  # watsonx:
  #   endpoint: https://us-south.ml.cloud.ibm.com
  #   projectId: ""
  #   apiKeySecret:
  #     name: my-watsonx-secret
  #     key: WATSONX_API_KEY

  # External OpenSearch — required unless credentials are in backend envSecret
  # opensearch:
  #   host: opensearch-coordinating.opensearch.svc.cluster.local
  #   port: 9200
  #   scheme: https
  #   indexName: documents
  #   credentialsSecret: opensearch-credentials   # keys: username, password

  # External Docling — optional document conversion
  # docling:
  #   host: docling-serve.docling.svc.cluster.local
  #   port: 5001
  #   scheme: http

  networkPolicy:
    enabled: false
