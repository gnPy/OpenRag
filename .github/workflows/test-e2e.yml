name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'tests/**'
      - 'scripts/**'
      - 'flows/**'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - 'Makefile'
      - '.github/workflows/test-e2e.yml'
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  PLAYWRIGHT_BROWSERS_PATH: "ms-playwright"
  PLAYWRIGHT_VERSION: "1.57.0"
  # Total number of parallel test shards
  TOTAL_SHARDS: 4

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Build all Docker images once and export as artifact
  # ──────────────────────────────────────────────────────────────
  build:
    runs-on:
      labels: ["self-hosted", "linux", "ARM64", "langflow-ai-arm64-40gb-ephemeral-sudo"]
    env:
      OPENSEARCH_PASSWORD: ${{ vars.OPENSEARCH_PASSWORD || secrets.OPENSEARCH_PASSWORD || 'OpenRag#2025!' }}
    steps:
      - name: Cleanup Docker cache
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          docker compose -f docker-compose.yml down -v --remove-orphans || true

      - name: Cleanup root-owned files (OpenSearch data, config, Langflow data, keys, data, flows, documents)
        run: |
          for i in 1 2 3; do
            docker run --rm -v $(pwd):/work alpine sh -c "rm -rf /work/opensearch-data /work/config /work/langflow-data /work/keys /work/data /work/flows /work/openrag-documents" && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          make build
          docker builder prune -af

      - name: Export Docker images to tarball
        run: |
          docker save \
            langflowai/openrag-opensearch:latest \
            langflowai/openrag-backend:latest \
            langflowai/openrag-frontend:latest \
            langflowai/openrag-langflow:latest \
            -o /tmp/openrag-images.tar

      - name: Upload Docker images artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/openrag-images.tar
          retention-days: 1
          compression-level: 1

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Run E2E tests in parallel shards
  # ──────────────────────────────────────────────────────────────
  test:
    needs: build
    runs-on:
      labels: ["self-hosted", "linux", "ARM64", "langflow-ai-arm64-40gb-ephemeral-sudo"]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      LANGFLOW_AUTO_LOGIN: "True"
      LANGFLOW_NEW_USER_IS_ACTIVE: "True"
      LANGFLOW_ENABLE_SUPERUSER_CLI: "True"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      WATSONX_API_KEY: ${{ secrets.WATSONX_API_KEY }}
      WATSONX_ENDPOINT: ${{ secrets.WATSONX_ENDPOINT }}
      WATSONX_PROJECT_ID: ${{ secrets.WATSONX_PROJECT_ID }}
      OLLAMA_ENDPOINT: ${{ secrets.OLLAMA_ENDPOINT }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OPENSEARCH_PASSWORD: ${{ vars.OPENSEARCH_PASSWORD || secrets.OPENSEARCH_PASSWORD || 'OpenRag#2025!' }}
      LANGFLOW_CHAT_FLOW_ID: ${{ vars.LANGFLOW_CHAT_FLOW_ID || '1098eea1-6649-4e1d-aed1-b77249fb8dd0' }}
      LANGFLOW_INGEST_FLOW_ID: ${{ vars.LANGFLOW_INGEST_FLOW_ID || '5488df7c-b93f-4f87-a446-b67028bc0813' }}
      LANGFLOW_URL_INGEST_FLOW_ID: ${{ vars.LANGFLOW_URL_INGEST_FLOW_ID || '72c3d17c-2dac-4a73-b48a-6518473d7830' }}
      NUDGES_FLOW_ID: ${{ vars.NUDGES_FLOW_ID || 'ebc01d31-1976-46ce-a385-b0240327226c' }}

    steps:
      - name: Cleanup Docker cache
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          docker compose -f docker-compose.yml down -v --remove-orphans || true

      - name: Cleanup root-owned files
        run: |
          for i in 1 2 3; do
            docker run --rm -v $(pwd):/work alpine sh -c "rm -rf /work/opensearch-data /work/config /work/langflow-data /work/keys /work/data /work/flows /work/openrag-documents" && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python
        run: uv python install 3.13

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium

      - name: Download Docker images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/openrag-images.tar
          rm -f /tmp/openrag-images.tar
          echo "Loaded images:"
          docker images --filter "reference=langflowai/openrag-*" --format "  {{.Repository}}:{{.Tag}} ({{.Size}})"

      - name: Setup E2E infrastructure
        run: |
          chmod +x scripts/setup-e2e.sh
          ./scripts/setup-e2e.sh

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ env.TOTAL_SHARDS }})
        working-directory: frontend
        env:
          CI: "true"
          # OpenSearch
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: "9200"
          OPENSEARCH_USERNAME: admin
          OPENSEARCH_PASSWORD: ${{ env.OPENSEARCH_PASSWORD }}
          # LLM / Embedding provider keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Watsonx — test code expects WATSONX_* names
          WATSONX_API_KEY: ${{ secrets.WATSONX_API_KEY }}
          WATSONX_ENDPOINT: ${{ secrets.WATSONX_ENDPOINT }}
          WATSONX_PROJECT_ID: ${{ secrets.WATSONX_PROJECT_ID }}
          # Ollama
          OLLAMA_ENDPOINT: ${{ secrets.OLLAMA_ENDPOINT }}
          # OAuth — disabled for E2E
          GOOGLE_OAUTH_CLIENT_ID: ""
          GOOGLE_OAUTH_CLIENT_SECRET: ""
          # AWS
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: npx playwright test --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }}

      - name: Collect service logs on failure
        if: failure()
        run: |
          mkdir -p service-logs
          docker logs os > service-logs/opensearch.log 2>&1 || true
          docker logs openrag-backend > service-logs/backend.log 2>&1 || true
          docker logs langflow > service-logs/langflow.log 2>&1 || true
          docker logs openrag-backend-proxy > service-logs/backend-proxy.log 2>&1 || true

      - name: Upload service logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: service-logs-shard-${{ matrix.shard }}
          path: service-logs/
          retention-days: 7

      - name: Upload blob report (for merge)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: frontend/blob-report/
          retention-days: 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: frontend/test-results/
          retention-days: 7

      - name: Teardown infrastructure
        if: always()
        run: |
          make docling-stop || true
          docker rm -f openrag-backend-proxy 2>/dev/null || true
          make clean || true
          docker system prune -f || true

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Merge all shard reports into a single HTML report
  # ──────────────────────────────────────────────────────────────
  merge-reports:
    if: ${{ !cancelled() }}
    needs: test
    runs-on:
      labels: ["self-hosted", "linux", "ARM64", "langflow-ai-arm64-40gb-ephemeral-sudo"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Download all shard blob reports
        uses: actions/download-artifact@v4
        with:
          path: frontend/all-blob-reports
          pattern: blob-report-shard-*
          merge-multiple: true

      - name: Merge into HTML Report
        working-directory: frontend
        run: |
          npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
