name: Frontend Lint

on:
  pull_request:
  merge_group:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decision.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - 'frontend/**'
              - '.github/workflows/lint-frontend.yml'
      - id: decision
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  biome:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    name: Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Biome check
        working-directory: frontend
        run: npm run lint

  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck
  required:
    needs: biome
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify biome result
        run: |
          result="${{ needs.biome.result }}"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "biome job did not succeed: $result"
            exit 1
          fi
          echo "biome result: $result (success or skipped — passing)"
